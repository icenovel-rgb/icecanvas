<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ICE Canvas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="canvas-page">
  <div class="canvas-topbar">
    <button class="canvas-tool canvas-tool--ghost" data-act="new-local" title="새 캔버스">새로</button>
    <span class="canvas-title">새 캔버스</span>
    <span class="canvas-toolbar__spacer"></span>
    <button class="canvas-tool canvas-tool--coffee" data-act="donate" title="개발자 후원하기 — Buy Me a Coffee">☕ 후원</button>
    <button class="canvas-tool" data-act="help" title="사용방법">도움말</button>
    <button class="canvas-tool" data-act="dark" title="다크모드" id="canvasDark">다크</button>
    <button class="canvas-tool" data-act="zoom-out" title="축소 (-)">-</button>
    <button class="canvas-tool" data-act="zoom-reset" id="canvasZoomLevel" title="100%로 재설정">100%</button>
    <button class="canvas-tool" data-act="zoom-in" title="확대 (+)">+</button>
    <button class="canvas-tool" data-act="fit" title="화면 맞춤">맞춤</button>
    <button class="canvas-tool" data-act="present" title="슬라이드쇼 (Shift+F)">▶ 슬라이드쇼</button>
    <button class="canvas-tool" data-act="open-native" title=".icv 열기 (.canvas도 가능)">열기</button>
    <button class="canvas-tool" data-act="save-as" title="다른 이름으로 저장">다른 이름으로 저장</button>
    <label class="canvas-tool" title=".icv/.canvas 가져오기">가져오기<input type="file" id="canvasImport" accept=".icv,.canvas,application/json" hidden></label>
    <button class="canvas-tool canvas-tool--primary" data-act="save" id="canvasSaveBtn">저장</button>
  </div>

  <div class="canvas-body">
    <div class="canvas-rail">
      <div class="rail-label">추가</div>
      <div class="rail-grid">
        <button class="rail-btn" data-act="add-text" title="텍스트 카드 (Alt+N)"><svg viewBox="0 0 16 16" aria-hidden="true"><rect x="2" y="3" width="12" height="10" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M4.5 6.5h7M4.5 9.5h4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button>
        <button class="rail-btn" data-act="add-link" title="링크 상자 (Alt+L)"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M6.6 9.4l2.8-2.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M8.8 4.6l1.1-1.1a2.4 2.4 0 0 1 3.4 3.4l-1.9 1.9a2.4 2.4 0 0 1-3.4 0" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M7.2 11.4l-1.1 1.1a2.4 2.4 0 0 1-3.4-3.4l1.9-1.9a2.4 2.4 0 0 1 3.4 0" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button>
        <label class="rail-btn" title="PDF 추가"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4 1.5h5L12.5 5v9.5h-8.5z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M9 1.5V5h3.5" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M5.8 8.5h4.4M5.8 11h4.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg><input type="file" id="canvasPdfIn" accept="application/pdf" hidden></label>
        <label class="rail-btn" title="파일/이미지/동영상 추가"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M9.2 2.2 3.4 8a2.6 2.6 0 0 0 3.7 3.7l5.5-5.5a1.6 1.6 0 0 0-2.3-2.3L5 9.2a.7.7 0 0 0 1 1l5-5" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg><input type="file" id="canvasFileIn" hidden multiple></label>
        <button class="rail-btn" data-act="add-artboard" title="아트보드 추가 (16:9 슬라이드)"><svg viewBox="0 0 16 16" aria-hidden="true"><rect x="1.5" y="3.5" width="13" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M1.5 6h13" stroke="currentColor" stroke-width="1.1"/><circle cx="3.4" cy="4.75" r=".55" fill="currentColor"/></svg></button>
      </div>
      <div class="rail-sep"></div>
      <div class="rail-label">도구</div>
      <div class="rail-grid">
        <button class="rail-btn" data-tool="select" title="선택 (V)"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4 1.5 L11.5 8.2 L7.8 8.7 L9.7 13 L7.9 13.8 L6 9.6 L4 11.4 Z" fill="currentColor"/></svg></button>
        <button class="rail-btn" data-tool="direct" title="직접 선택 (A)"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4 1.5 L11.5 8.2 L7.8 8.7 L9.7 13 L7.9 13.8 L6 9.6 L4 11.4 Z" fill="none" stroke="currentColor" stroke-width="1.3"/></svg></button>
        <button class="rail-btn" data-tool="pen" title="펜 (P)"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1 C8 1 4.8 6 4.8 8.6 a3.2 3.2 0 0 0 6.4 0 C11.2 6 8 1 8 1 Z" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M8 8 v7" stroke="currentColor" stroke-width="1.3"/></svg></button>
        <button class="rail-btn" data-tool="rect" title="사각형 (M)"><svg viewBox="0 0 16 16" aria-hidden="true"><rect x="2.5" y="3.5" width="11" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.4"/></svg></button>
        <button class="rail-btn" data-tool="ellipse" title="원 (L)"><svg viewBox="0 0 16 16" aria-hidden="true"><ellipse cx="8" cy="8" rx="5.7" ry="4.6" fill="none" stroke="currentColor" stroke-width="1.4"/></svg></button>
        <button class="rail-btn" data-act="group" title="그룹 / 해제 (G)"><svg viewBox="0 0 16 16" aria-hidden="true"><rect x="2" y="2" width="8" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.3" stroke-dasharray="2.2 1.6"/><rect x="6.5" y="6.5" width="7.5" height="7.5" rx="1" fill="none" stroke="currentColor" stroke-width="1.3"/></svg></button>
        <button class="rail-btn" data-act="lock-toggle" title="잠금 / 해제 (Shift+2)"><svg viewBox="0 0 16 16" aria-hidden="true"><rect x="3.5" y="7" width="9" height="6.5" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M5.3 7V5.2a2.7 2.7 0 0 1 5.4 0V7" fill="none" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="10" r="1" fill="currentColor"/></svg></button>
      </div>
      <div class="rail-sep"></div>
      <div class="rail-label">색</div>
      <div class="rail-paint" id="canvasPaint"></div>
      <div class="rail-sep"></div>
      <div class="rail-label">정렬</div>
      <div class="rail-grid">
        <button class="rail-btn" data-act="align-left" title="왼쪽 정렬 (L)"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 1.5v13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><rect x="3.6" y="3.5" width="9" height="3.2" rx="1" fill="currentColor"/><rect x="3.6" y="9.3" width="5.5" height="3.2" rx="1" fill="currentColor"/></svg></button>
        <button class="rail-btn" data-act="align-centerH" title="가로 가운데 (C)"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1.5v13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><rect x="3" y="3.5" width="10" height="3.2" rx="1" fill="currentColor"/><rect x="5" y="9.3" width="6" height="3.2" rx="1" fill="currentColor"/></svg></button>
        <button class="rail-btn" data-act="align-right" title="오른쪽 정렬 (R)"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M14 1.5v13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><rect x="3.4" y="3.5" width="9" height="3.2" rx="1" fill="currentColor"/><rect x="6.9" y="9.3" width="5.5" height="3.2" rx="1" fill="currentColor"/></svg></button>
        <button class="rail-btn" data-act="align-top" title="위 정렬 (Q)"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M1.5 2h13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><rect x="3.5" y="3.6" width="3.2" height="9" rx="1" fill="currentColor"/><rect x="9.3" y="3.6" width="3.2" height="5.5" rx="1" fill="currentColor"/></svg></button>
        <button class="rail-btn" data-act="align-centerV" title="세로 가운데 (H)"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M1.5 8h13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><rect x="3.5" y="3" width="3.2" height="10" rx="1" fill="currentColor"/><rect x="9.3" y="5" width="3.2" height="6" rx="1" fill="currentColor"/></svg></button>
        <button class="rail-btn" data-act="align-bottom" title="아래 정렬 (U)"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M1.5 14h13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><rect x="3.5" y="3.4" width="3.2" height="9" rx="1" fill="currentColor"/><rect x="9.3" y="6.9" width="3.2" height="5.5" rx="1" fill="currentColor"/></svg></button>
      </div>
    </div>

    <div class="canvas-stage" id="canvasStage">
      <div class="canvas-world" id="canvasWorld">
        <svg class="canvas-edges" id="canvasEdges" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="canvas-nodes" id="canvasNodes"></div>
      </div>
      <div class="canvas-hint" id="canvasHint"></div>
    </div>
  </div>
</div>

<script src="bootstrap.js"></script>
<script src="app.js"></script>
<script src="canvas-vector.js"></script>
<script src="canvas-crop.js"></script>
<script src="canvas-present.js"></script>
<script src="tauri-bridge.js"></script>
<script src="init.js"></script>
</body>
</html>
